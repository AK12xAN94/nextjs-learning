<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script defer src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
</head>
<body>
    <div id="root"></div>
    <script>
        const msg = 'Hello React';
        const VDOM = React.createElement('h1', {title: msg}, msg);
        ReactDOM.render(VDOM, document.getElementById('root'));
    </script>

    
</body>
</html>
